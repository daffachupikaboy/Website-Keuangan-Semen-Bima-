<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catatan Keuangan Semen Bima</title>
    <!-- Import Font Modern kekinian: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c5ce7; /* Ungu pastel */
            --secondary: #00cec9; /* Tosca */
            --danger: #ff7675; /* Merah soft */
            --success: #00b894; /* Hijau soft */
            --bg-gradient: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            --text-dark: #2d3436;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        /* Gaya Kotak Utama (Glassmorphism) */
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        h2 {
            text-align: center;
            color: var(--primary);
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .subtitle {
            text-align: center;
            color: #636e72;
            font-size: 14px;
            margin-bottom: 25px;
        }

        h3 {
            color: var(--primary);
            font-size: 20px;
            margin-top: 40px;
            border-bottom: 2px dashed #dfe6e9;
            padding-bottom: 10px;
        }

        /* Notifikasi Koneksi kekinian */
        .status-koneksi {
            text-align: center;
            padding: 10px 20px;
            margin: 0 auto 25px auto;
            border-radius: 50px;
            background-color: #ffeaa7;
            color: #d35400;
            font-weight: 600;
            font-size: 14px;
            max-width: max-content;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }
        .connected {
            background-color: #55efc4;
            color: #00b894;
        }
        .error {
            background-color: var(--danger);
            color: white;
        }

        /* Kotak Ringkasan Kekinian */
        .summary-container {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }
        .summary-box {
            flex: 1;
            background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            color: white;
            box-shadow: 0 8px 15px rgba(108, 92, 231, 0.2);
            transition: transform 0.3s ease;
        }
        .summary-box.secondary {
            background: linear-gradient(135deg, #00cec9 0%, #81ecec 100%);
            box-shadow: 0 8px 15px rgba(0, 206, 201, 0.2);
        }
        .summary-box:hover {
            transform: translateY(-5px);
        }
        .summary-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 5px;
        }
        .summary-value {
            font-size: 24px;
            font-weight: 700;
        }

        /* Form Input */
        .form-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            background: rgba(255, 255, 255, 0.5);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.8);
        }
        input, select {
            padding: 12px 15px;
            border: 2px solid #dfe6e9;
            border-radius: 12px;
            font-size: 15px;
            width: 100%;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            background: white;
            transition: all 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.1);
        }
        
        .btn-submit {
            grid-column: span 2;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(108, 92, 231, 0.3);
        }
        .btn-submit:hover:not(:disabled) {
            background-color: #5f27cd;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(108, 92, 231, 0.4);
        }
        .btn-submit:disabled {
            background-color: #b2bec3;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* Tabel Kekinian (Tanpa garis pinggir kaku) */
        .table-responsive {
            overflow-x: auto;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            min-width: 600px;
            background: white;
            border-radius: 16px;
            overflow: hidden;
        }
        th, td {
            padding: 15px;
            text-align: center;
        }
        th {
            background-color: #f1f2f6;
            color: #576574;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 0.5px;
        }
        td {
            border-bottom: 1px solid #f1f2f6;
            color: #2d3436;
            font-size: 14px;
        }
        tr:last-child td {
            border-bottom: none;
        }
        tr:hover td {
            background-color: #fafbfc;
        }
        .text-left { text-align: left; }

        /* Badge Status / Label (Gaya Anak Muda) */
        .badge {
            padding: 6px 12px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 13px;
            display: inline-block;
        }
        .badge-negative { background-color: #ffeaa7; color: #d63031; }
        .badge-positive { background-color: #55efc4; color: #009432; }
        .badge-neutral { background-color: #dfe6e9; color: #636e72; }

        .btn-delete {
            background: #ff7675;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 13px;
            font-family: 'Poppins', sans-serif;
            transition: 0.2s;
        }
        .btn-delete:hover { background: #d63031; }

        /* Modal Styles */
